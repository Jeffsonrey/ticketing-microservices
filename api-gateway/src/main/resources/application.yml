spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: customers-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/customers/**
            - id: event-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/events/**
            - id: ticketinventory-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/ticket-inventories/**
            - id: ticketordermanagement-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/ticket-orders/**
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
