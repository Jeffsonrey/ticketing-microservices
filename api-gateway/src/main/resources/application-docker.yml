spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: customers-service
              uri: http://customers-service:8081
              predicates:
                - Path=/api/customers/**
            - id: event-service
              uri: http://event-service:8082
              predicates:
                - Path=/api/events/**
            - id: ticketinventory-service
              uri: http://ticketinventory-service:8083
              predicates:
                - Path=/api/ticket-inventories/**
            - id: ticketordermanagement-service
              uri: http://ticketordermanagement-service:8084
              predicates:
                - Path=/api/ticket-orders/**
