$kind: http-request
url: "{{baseUrl}}/api/customers/{{customerId}}"
method: DELETE
scripts:
  - type: beforeRequest
    code: >-
      const id = pm.collectionVariables.get('customerId');

      if (!id) throw new Error('customerId is empty. Run Create Customer
      first.');
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 204', function () { pm.response.to.have.status(204); });
    language: text/javascript
order: 8000
