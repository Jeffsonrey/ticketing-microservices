$kind: http-request
url: "{{baseUrl}}/api/customers"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "firstName": "{{customerFirstName}}",
      "lastName": "{{customerLastName}}",
      "emailAddress": "{{customerEmail}}",
      "phoneNumber": "{{customerPhone}}"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200 or 201', function () { pm.expect([200,
      201]).to.include(pm.response.code); });

      const json = pm.response.json();

      const id = json.id || json.customerId || (json.data && json.data.id);

      pm.test('Response returned a customer id', function () { pm.expect(id,
      'customer id missing').to.be.ok; });

      pm.collectionVariables.set('customerId', id);
    language: text/javascript
order: 1000
