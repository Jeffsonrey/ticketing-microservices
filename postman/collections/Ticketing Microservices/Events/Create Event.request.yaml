$kind: http-request
url: "{{baseUrl}}/api/events"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "title": "{{eventTitle}}",
      "description": "{{eventDescription}}",
      "venueName": "{{venueName}}",
      "venueAddress": "{{venueAddress}}",
      "venueCity": "{{venueCity}}",
      "startDateTime": "{{eventStartDateTime}}",
      "endDateTime": "{{eventEndDateTime}}",
      "totalCapacity": {{eventCapacity}}
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200 or 201', function () { pm.expect([200,
      201]).to.include(pm.response.code); });

      const json = pm.response.json();

      const id = json.id || json.eventId || (json.data && json.data.id);

      pm.test('Response returned an event id', function () { pm.expect(id,
      'event id missing').to.be.ok; });

      pm.collectionVariables.set('eventId', id);
    language: text/javascript
order: 1000
