$kind: http-request
url: "{{baseUrl}}/api/events/{{eventId}}"
method: DELETE
scripts:
  - type: beforeRequest
    code: |-
      const id = pm.collectionVariables.get('eventId');
      if (!id) throw new Error('eventId is empty. Run Create Event first.');
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 204', function () { pm.response.to.have.status(204); });
    language: text/javascript
order: 9000
