spring:
  datasource:
    url: jdbc:h2:mem:ticketordermanagement-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  application:
    name: ticketordermanagement-service


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8084

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

services:
  events:
    base-url: https://localhost:8082
  ticket-inventories:
    base-url: https://localhost:8083
  customers:
    base-url: https://localhost:8081